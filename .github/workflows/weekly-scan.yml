name: Weekly Pain Point Scan

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC

  workflow_dispatch:
    inputs:
      run_discovery:
        description: 'Run subreddit discovery (monthly refresh)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  scan:
    name: Run Pain Point Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create output directories
        run: mkdir -p output/reports output/raw output/classified

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REDDIT_USER_AGENT: TryLinguals_PainPointScanner/1.0
          GIT_AUTHOR_NAME:      "TryLinguals Scanner"
          GIT_AUTHOR_EMAIL:     "scanner@trylinguals.com"
          GIT_COMMITTER_NAME:   "TryLinguals Scanner"
          GIT_COMMITTER_EMAIL:  "scanner@trylinguals.com"
        run: |
          if [ "${{ github.event.inputs.run_discovery }}" = "true" ]; then
            python main.py --run-discovery
          else
            python main.py
          fi

      - name: Upload raw data as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scanner-data-${{ github.run_id }}
          path: |
            output/raw/
            output/classified/
          retention-days: 14
