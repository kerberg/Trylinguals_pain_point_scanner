name: Weekly Pain Point Scan

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC

  workflow_dispatch:
    # No run_discovery option — discovery is local-only due to Reddit IP blocks in CI

jobs:
  scan:
    name: Run Pain Point Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create output directories
        run: mkdir -p output/reports output/raw output/classified

      - name: Validate Reddit credentials
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: |
          if [ -z "$REDDIT_CLIENT_ID" ] || [ -z "$REDDIT_CLIENT_SECRET" ]; then
            echo "REDDIT_CLIENT_ID and REDDIT_CLIENT_SECRET must be set in repository secrets."
            echo "Without them, Reddit blocks GitHub-hosted runners with 403 on anonymous endpoints."
            exit 1
          fi

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: linux:com.trylinguals.painpointscanner:v1.1 (by /u/trylinguals_scanner)
          GIT_AUTHOR_NAME:     "TryLinguals Scanner"
          GIT_AUTHOR_EMAIL:    "scanner@trylinguals.com"
          GIT_COMMITTER_NAME:  "TryLinguals Scanner"
          GIT_COMMITTER_EMAIL: "scanner@trylinguals.com"
        run: python main.py

      - name: Upload raw data as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scanner-data-${{ github.run_id }}
          path: |
            output/raw/
            output/classified/
          retention-days: 14
